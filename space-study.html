<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>🚀 太空学堂 - 小宇航员的学习冒险</title>
<style>
:root {
  --space-dark: #0a0e27;
  --space-mid: #141852;
  --star-gold: #ffd700;
  --nebula-pink: #ff6b9d;
  --nebula-blue: #4facfe;
  --nebula-purple: #a78bfa;
  --rocket-red: #ff4757;
  --planet-green: #2ed573;
  --planet-orange: #ffa502;
  --correct-green: #00e676;
  --wrong-red: #ff5252;
  --card-bg: rgba(255,255,255,0.08);
  --card-border: rgba(255,255,255,0.15);
  --text-white: #ffffff;
  --text-dim: rgba(255,255,255,0.7);
  --btn-radius: 16px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--space-dark);
  color: var(--text-white);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ====== 星空背景 ====== */
#starfield {
  position:fixed; inset:0; z-index:0; overflow:hidden;
}
.star {
  position:absolute; border-radius:50%; background:#fff;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.2); }
}
.shooting-star {
  position:absolute; width:3px; height:3px; background:#fff;
  border-radius:50%;
  box-shadow: 0 0 6px 2px rgba(255,255,255,0.6);
  animation: shoot linear infinite;
}
.shooting-star::after {
  content:''; position:absolute; top:50%; right:100%;
  width: 60px; height: 1px;
  background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
  transform: translateY(-50%);
}
@keyframes shoot {
  0% { transform: translate(0,0) rotate(-35deg); opacity:1; }
  70% { opacity:1; }
  100% { transform: translate(-500px, 350px) rotate(-35deg); opacity:0; }
}
.nebula {
  position:absolute; border-radius:50%; filter:blur(80px); opacity:0.15;
  animation: nebulaDrift 20s ease-in-out infinite alternate;
}
@keyframes nebulaDrift {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(30px,-20px) scale(1.1); }
}

/* ====== 页面容器 ====== */
.page {
  position:fixed; inset:0; z-index:1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: 20px 16px calc(20px + var(--safe-bottom));
  transition: opacity 0.4s, transform 0.4s;
  opacity:0; pointer-events:none; transform: scale(0.95);
}
.page.active {
  opacity:1; pointer-events:auto; transform: scale(1);
}

/* ====== 首页 ====== */
#home .astronaut-container {
  margin-bottom: 24px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.astronaut-svg { width: 120px; height: 120px; }
#home h1 {
  font-size: 2rem; font-weight: 800;
  background: linear-gradient(135deg, var(--star-gold), var(--nebula-blue), var(--nebula-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px; text-align:center;
}
#home .subtitle {
  color: var(--text-dim); font-size: 0.95rem; margin-bottom: 36px; text-align:center;
}
.btn-primary {
  width: 80%; max-width: 320px; padding: 16px 24px;
  background: linear-gradient(135deg, var(--nebula-blue), var(--nebula-purple));
  border: none; border-radius: var(--btn-radius);
  color: #fff; font-size: 1.2rem; font-weight: 700;
  cursor: pointer; position: relative; overflow: hidden;
  box-shadow: 0 4px 20px rgba(79,172,254,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:active {
  transform: scale(0.96);
  box-shadow: 0 2px 10px rgba(79,172,254,0.3);
}

/* ====== 科目选择 ====== */
#subject h2 { font-size:1.5rem; margin-bottom:24px; }
.subject-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  width: 100%; max-width: 400px;
}
.subject-card {
  background: var(--card-bg); border: 2px solid var(--card-border);
  border-radius: 20px; padding: 24px 16px; text-align:center;
  cursor: pointer; transition: all 0.3s;
  backdrop-filter: blur(10px);
}
.subject-card:active { transform: scale(0.95); }
.subject-card .icon { font-size: 2.8rem; margin-bottom: 8px; }
.subject-card .label { font-size: 1.1rem; font-weight: 600; }
.subject-card.chinese { border-color: rgba(255,107,157,0.4); }
.subject-card.chinese .icon { filter: drop-shadow(0 0 10px rgba(255,107,157,0.5)); }
.subject-card.math { border-color: rgba(79,172,254,0.4); }
.subject-card.math .icon { filter: drop-shadow(0 0 10px rgba(79,172,254,0.5)); }
.btn-back {
  margin-top: 28px; background:none; border: 1px solid var(--card-border);
  color: var(--text-dim); padding: 10px 32px; border-radius: 30px;
  font-size: 0.95rem; cursor:pointer; transition: all 0.2s;
}
.btn-back:active { background: rgba(255,255,255,0.05); }

/* ====== 难度选择 ====== */
#difficulty h2 { font-size:1.5rem; margin-bottom:8px; }
#difficulty .diff-subtitle { color:var(--text-dim); margin-bottom:24px; font-size:0.9rem; }
.difficulty-list { width:100%; max-width:380px; display:flex; flex-direction:column; gap:12px; }
.difficulty-btn {
  display:flex; align-items:center; gap:16px;
  background: var(--card-bg); border: 2px solid var(--card-border);
  border-radius: var(--btn-radius); padding: 16px 20px;
  cursor:pointer; transition: all 0.3s; color:#fff;
  font-size:1rem;
}
.difficulty-btn:active { transform: scale(0.97); }
.difficulty-btn .diff-icon { font-size:1.8rem; }
.difficulty-btn .diff-info { flex:1; text-align:left; }
.difficulty-btn .diff-name { font-weight:700; font-size:1.05rem; }
.difficulty-btn .diff-desc { font-size:0.8rem; color:var(--text-dim); margin-top:2px; }
.difficulty-btn.easy { border-color: rgba(46,213,115,0.4); }
.difficulty-btn.medium { border-color: rgba(255,165,2,0.4); }
.difficulty-btn.hard { border-color: rgba(255,71,87,0.4); }

/* ====== 答题页 ====== */
#quiz { justify-content: flex-start; padding-top: max(env(safe-area-inset-top, 20px), 20px); }
.quiz-header {
  width:100%; max-width:400px;
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom: 16px;
}
.quiz-header .progress-text { font-size:0.85rem; color:var(--text-dim); }
.quiz-header .star-count { font-size:0.95rem; color:var(--star-gold); font-weight:700; }
.progress-bar {
  width:100%; max-width:400px; height:8px;
  background: rgba(255,255,255,0.1); border-radius:4px;
  margin-bottom: 24px; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:4px;
  background: linear-gradient(90deg, var(--nebula-blue), var(--nebula-purple));
  transition: width 0.4s ease;
}
.question-card {
  width:100%; max-width:400px;
  background: var(--card-bg); border: 2px solid var(--card-border);
  border-radius: 24px; padding: 32px 24px;
  backdrop-filter: blur(10px);
  text-align:center; flex:1;
  display:flex; flex-direction:column; justify-content:center;
}
.question-tag {
  display:inline-block; padding: 4px 14px; border-radius:20px;
  font-size:0.75rem; font-weight:600; margin-bottom:16px;
  background: rgba(255,255,255,0.1); color: var(--nebula-blue);
}
.question-text {
  font-size: 1.6rem; font-weight: 700; line-height: 1.5;
  margin-bottom: 28px;
  min-height: 60px; display:flex; align-items:center; justify-content:center;
}
.options-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.option-btn {
  padding: 16px 12px; border-radius: var(--btn-radius);
  border: 2px solid var(--card-border);
  background: rgba(255,255,255,0.05);
  color: #fff; font-size: 1.15rem; font-weight: 600;
  cursor: pointer; transition: all 0.25s;
  min-height: 56px; display:flex; align-items:center; justify-content:center;
}
.option-btn:active { transform: scale(0.96); }
.option-btn.correct {
  border-color: var(--correct-green);
  background: rgba(0,230,118,0.15);
  color: var(--correct-green);
  animation: correctPulse 0.5s ease;
}
.option-btn.wrong {
  border-color: var(--wrong-red);
  background: rgba(255,82,82,0.15);
  color: var(--wrong-red);
  animation: shake 0.4s ease;
}
@keyframes correctPulse {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.05); }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-6px); }
  75% { transform:translateX(6px); }
}

/* ====== 反馈动画 ====== */
.feedback-overlay {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; transition: opacity 0.3s;
}
.feedback-overlay.show { opacity:1; }
.feedback-icon {
  font-size: 5rem;
  animation: feedbackPop 0.8s ease forwards;
}
@keyframes feedbackPop {
  0% { transform: scale(0) rotate(-20deg); opacity:0; }
  50% { transform: scale(1.3) rotate(5deg); opacity:1; }
  100% { transform: scale(1) rotate(0deg); opacity:0; }
}

/* ====== 结果页 ====== */
#result .result-card {
  width:100%; max-width:380px;
  background: var(--card-bg); border: 2px solid var(--card-border);
  border-radius: 28px; padding: 36px 28px;
  backdrop-filter: blur(10px); text-align:center;
}
.result-title { font-size:1.6rem; font-weight:800; margin-bottom:20px; }
.result-stars { font-size:2.5rem; margin-bottom:8px; }
.result-score { font-size:3.5rem; font-weight:900; margin:12px 0;
  background: linear-gradient(135deg, var(--star-gold), var(--planet-orange));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.result-detail { color:var(--text-dim); font-size:0.9rem; margin-bottom:6px; }
.result-encourage { color:var(--nebula-pink); font-size:1.1rem; font-weight:600;
  margin: 20px 0 28px; line-height:1.6;
}
.result-btns { display:flex; flex-direction:column; gap:10px; }
.btn-result {
  padding: 14px; border-radius: var(--btn-radius);
  font-size: 1.05rem; font-weight: 600;
  cursor:pointer; border:none; transition: transform 0.2s;
}
.btn-result:active { transform: scale(0.96); }
.btn-result.primary {
  background: linear-gradient(135deg, var(--nebula-blue), var(--nebula-purple));
  color:#fff;
}
.btn-result.secondary {
  background: var(--card-bg); border: 1px solid var(--card-border);
  color: var(--text-dim);
}

/* ====== 粒子效果 ====== */
.particle {
  position:fixed; z-index:20; pointer-events:none;
  border-radius:50%;
  animation: particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity:1; transform: translate(0,0) scale(1); }
  100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

/* ====== 连击效果 ====== */
.combo-display {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:15; font-size:2rem; font-weight:900; color:var(--star-gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
  pointer-events:none; opacity:0;
}
.combo-display.show {
  animation: comboShow 1s ease forwards;
}
@keyframes comboShow {
  0% { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
  30% { opacity:1; transform:translate(-50%,-50%) scale(1.2); }
  100% { opacity:0; transform:translate(-50%,-70%) scale(1); }
}
</style>
</head>
<body>

<!-- 星空背景 -->
<div id="starfield"></div>

<!-- 反馈动画层 -->
<div id="feedback-overlay" class="feedback-overlay"></div>
<div id="combo-display" class="combo-display"></div>

<!-- ====== 首页 ====== -->
<div id="home" class="page active">
  <div class="astronaut-container">
    <svg class="astronaut-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- 头盔 -->
      <circle cx="100" cy="85" r="45" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
      <circle cx="100" cy="85" r="36" fill="#1a1a3e" opacity="0.85"/>
      <!-- 眼睛 -->
      <ellipse cx="88" cy="82" rx="7" ry="8" fill="#fff"/>
      <ellipse cx="112" cy="82" rx="7" ry="8" fill="#fff"/>
      <circle cx="90" cy="80" r="4" fill="#333"/>
      <circle cx="114" cy="80" r="4" fill="#333"/>
      <circle cx="91" cy="78" r="1.5" fill="#fff"/>
      <circle cx="115" cy="78" r="1.5" fill="#fff"/>
      <!-- 笑脸 -->
      <path d="M90 95 Q100 106 110 95" stroke="#ff6b9d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- 腮红 -->
      <ellipse cx="78" cy="94" rx="7" ry="4" fill="#ff9fb3" opacity="0.5"/>
      <ellipse cx="122" cy="94" rx="7" ry="4" fill="#ff9fb3" opacity="0.5"/>
      <!-- 身体 -->
      <rect x="75" y="128" width="50" height="40" rx="15" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
      <!-- 胸前标志 -->
      <circle cx="100" cy="148" r="8" fill="none" stroke="#4facfe" stroke-width="2"/>
      <text x="100" y="152" text-anchor="middle" font-size="10" fill="#4facfe">★</text>
      <!-- 背包 -->
      <rect x="60" y="130" width="18" height="30" rx="6" fill="#a78bfa" opacity="0.7"/>
      <rect x="122" y="130" width="18" height="30" rx="6" fill="#a78bfa" opacity="0.7"/>
      <!-- 腿 -->
      <rect x="82" y="166" width="14" height="20" rx="7" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5"/>
      <rect x="104" y="166" width="14" height="20" rx="7" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5"/>
      <!-- 靴子 -->
      <ellipse cx="89" cy="188" rx="10" ry="6" fill="#4facfe"/>
      <ellipse cx="111" cy="188" rx="10" ry="6" fill="#4facfe"/>
      <!-- 手臂 -->
      <ellipse cx="65" cy="145" rx="8" ry="16" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5" transform="rotate(-15,65,145)"/>
      <ellipse cx="135" cy="140" rx="8" ry="16" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5" transform="rotate(20,135,140)"/>
      <!-- 手套 -->
      <circle cx="60" cy="158" r="7" fill="#ffa502"/>
      <circle cx="141" cy="152" r="7" fill="#ffa502"/>
    </svg>
  </div>
  <h1>太空学堂</h1>
  <p class="subtitle">小宇航员的学习冒险之旅 ✨</p>
  <button class="btn-primary" onclick="showPage('subject')">🚀 开始探险</button>
</div>

<!-- ====== 科目选择 ====== -->
<div id="subject" class="page">
  <h2>选择探险科目 🪐</h2>
  <div class="subject-grid">
    <div class="subject-card chinese" onclick="selectSubject('chinese')">
      <div class="icon">📚</div>
      <div class="label">语文星球</div>
    </div>
    <div class="subject-card math" onclick="selectSubject('math')">
      <div class="icon">🔢</div>
      <div class="label">数学星系</div>
    </div>
  </div>
  <button class="btn-back" onclick="showPage('home')">← 返回基地</button>
</div>

<!-- ====== 难度选择 ====== -->
<div id="difficulty" class="page">
  <h2>选择飞行难度 🎯</h2>
  <p class="diff-subtitle" id="diff-subtitle">准备好了吗？</p>
  <div class="difficulty-list">
    <button class="difficulty-btn easy" onclick="selectDifficulty('easy')">
      <span class="diff-icon">🌟</span>
      <div class="diff-info">
        <div class="diff-name">初级飞行员</div>
        <div class="diff-desc" id="easy-desc">基础内容，轻松起步</div>
      </div>
    </button>
    <button class="difficulty-btn medium" onclick="selectDifficulty('medium')">
      <span class="diff-icon">⚡</span>
      <div class="diff-info">
        <div class="diff-name">中级探险家</div>
        <div class="diff-desc" id="medium-desc">加大难度，挑战自我</div>
      </div>
    </button>
    <button class="difficulty-btn hard" onclick="selectDifficulty('hard')">
      <span class="diff-icon">🔥</span>
      <div class="diff-info">
        <div class="diff-name">高级指挥官</div>
        <div class="diff-desc" id="hard-desc">终极挑战，勇者无敌</div>
      </div>
    </button>
  </div>
  <button class="btn-back" onclick="showPage('subject')">← 返回选科</button>
</div>

<!-- ====== 答题页 ====== -->
<div id="quiz" class="page">
  <div class="quiz-header">
    <span class="progress-text" id="progress-text">第 1/10 题</span>
    <span class="star-count" id="star-count">⭐ 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="question-card">
    <div class="question-tag" id="question-tag">数学</div>
    <div class="question-text" id="question-text">题目加载中...</div>
    <div class="options-grid" id="options-grid"></div>
  </div>
</div>

<!-- ====== 结果页 ====== -->
<div id="result" class="page">
  <div class="result-card">
    <div class="result-title" id="result-title">探险完成！🎉</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>
    <div class="result-score" id="result-score">100分</div>
    <div class="result-detail" id="result-detail">答对 10/10 题</div>
    <div class="result-encourage" id="result-encourage">你太厉害了，小宇航员！</div>
    <div class="result-btns">
      <button class="btn-result primary" onclick="restartSameLevel()">🔄 再来一次</button>
      <button class="btn-result secondary" onclick="showPage('subject')">🪐 换个科目</button>
      <button class="btn-result secondary" onclick="showPage('home')">🏠 回到基地</button>
    </div>
  </div>
</div>

<script>
// ====== 游戏状态 ======
const state = {
  subject: '',      // 'chinese' | 'math'
  difficulty: '',   // 'easy' | 'medium' | 'hard'
  questions: [],
  currentQ: 0,
  totalQ: 10,
  stars: 0,
  combo: 0,
  correct: 0,
  answering: false
};

// ====== 星空背景初始化 ======
function initStarfield() {
  const sf = document.getElementById('starfield');
  // 星星
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --dur:${Math.random()*3+2}s;
      animation-delay:${Math.random()*3}s;
    `;
    sf.appendChild(s);
  }
  // 流星
  for (let i = 0; i < 3; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.cssText = `
      left:${30+Math.random()*60}%; top:${Math.random()*30}%;
      animation-duration:${Math.random()*3+4}s;
      animation-delay:${Math.random()*8+i*5}s;
    `;
    sf.appendChild(ss);
  }
  // 星云
  const nebulas = [
    { color:'#ff6b9d', x:'10%', y:'20%', w:200, h:200 },
    { color:'#4facfe', x:'70%', y:'60%', w:250, h:250 },
    { color:'#a78bfa', x:'50%', y:'10%', w:180, h:180 },
  ];
  nebulas.forEach((n, i) => {
    const el = document.createElement('div');
    el.className = 'nebula';
    el.style.cssText = `
      left:${n.x}; top:${n.y};
      width:${n.w}px; height:${n.h}px;
      background:${n.color};
      animation-delay:${i*7}s;
    `;
    sf.appendChild(el);
  });
}

// ====== 页面导航 ======
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if (pageId === 'subject') updateDiffDescriptions();
}

// ====== 更新难度描述 ======
function updateDiffDescriptions() {
  // 默认语文
  document.getElementById('easy-desc').textContent = '拼音认读、基础汉字';
  document.getElementById('medium-desc').textContent = '词语搭配、阅读理解';
  document.getElementById('hard-desc').textContent = '成语填空、知识挑战';
  document.getElementById('diff-subtitle').textContent = '在语文星球上探险！';
}
function updateDiffForMath() {
  document.getElementById('easy-desc').textContent = '5以内加减法';
  document.getElementById('medium-desc').textContent = '10-20以内加减法';
  document.getElementById('hard-desc').textContent = '连加连减、乘法入门';
  document.getElementById('diff-subtitle').textContent = '在数学星系中遨游！';
}

// ====== 选择科目 ======
function selectSubject(subject) {
  state.subject = subject;
  if (subject === 'math') updateDiffForMath();
  else updateDiffDescriptions();
  showPage('difficulty');
}

// ====== 选择难度并开始 ======
function selectDifficulty(diff) {
  state.difficulty = diff;
  startQuiz();
}

// ====== 生成题目 ======
function generateQuestions() {
  state.questions = [];
  const { subject, difficulty, totalQ } = state;
  const questionCount = totalQ;

  if (subject === 'math') {
    state.questions = generateMathQuestions(questionCount, difficulty);
  } else {
    state.questions = generateChineseQuestions(questionCount, difficulty);
  }
  // 打乱顺序
  shuffleArray(state.questions);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ====== 数学题生成 ======
function generateMathQuestions(count, diff) {
  const qs = [];
  for (let i = 0; i < count; i++) {
    let q, answer;
    if (diff === 'easy') {
      // 5以内加减法
      const a = randInt(0, 5);
      const b = randInt(0, 5);
      if (Math.random() < 0.5) {
        q = `${a} + ${b} = ?`; answer = a + b;
      } else {
        const big = Math.max(a, b), small = Math.min(a, b);
        q = `${big} − ${small} = ?`; answer = big - small;
      }
    } else if (diff === 'medium') {
      // 10-20以内加减法
      const type = Math.random();
      if (type < 0.5) {
        const a = randInt(5, 15); const b = randInt(1, 10);
        q = `${a} + ${b} = ?`; answer = a + b;
      } else {
        const a = randInt(10, 20); const b = randInt(1, a);
        q = `${a} − ${b} = ?`; answer = a - b;
      }
    } else {
      // 困难：连加连减、乘法
      const type = Math.random();
      if (type < 0.35) {
        // 连加
        const a = randInt(1, 8), b = randInt(1, 8), c = randInt(1, 8);
        q = `${a} + ${b} + ${c} = ?`; answer = a + b + c;
      } else if (type < 0.65) {
        // 加减混合
        const a = randInt(5, 15), b = randInt(1, 10);
        if (a >= b) {
          q = `${a} − ${b} + ${randInt(1,5)} = ?`; answer = a - b + randInt(1,5);
          // 重新计算answer
          const c = randInt(1, 5);
          q = `${a} − ${b} + ${c} = ?`; answer = a - b + c;
        } else {
          const c = randInt(1, 5);
          q = `${a} + ${b} − ${c} = ?`; answer = a + b - c;
        }
      } else {
        // 简单乘法
        const a = randInt(1, 5), b = randInt(1, 5);
        q = `${a} × ${b} = ?`; answer = a * b;
      }
    }
    // 生成选项
    const options = generateOptions(answer);
    qs.push({ question: q, answer, options, tag: '数学' });
  }
  return qs;
}

// ====== 语文题生成 ======
function generateChineseQuestions(count, diff) {
  const qs = [];
  const pool = diff === 'easy' ? pinyinEasyPool :
               diff === 'medium' ? chineseMediumPool :
               chineseHardPool;

  // 复制并打乱题池
  const shuffled = [...pool];
  shuffleArray(shuffled);
  for (let i = 0; i < count && i < shuffled.length; i++) {
    qs.push({...shuffled[i], tag: '语文'});
  }
  // 如果题池不够，重复使用
  while (qs.length < count) {
    qs.push({...pool[randInt(0, pool.length-1)], tag: '语文'});
  }
  return qs;
}

function generateOptions(correct) {
  const opts = new Set([correct]);
  let attempts = 0;
  while (opts.size < 4 && attempts < 50) {
    let offset = randInt(1, Math.max(5, Math.floor(correct * 0.3 + 3)));
    if (Math.random() < 0.5) offset = -offset;
    const val = correct + offset;
    if (val >= 0 && val !== correct) opts.add(val);
    attempts++;
  }
  // 如果还不够4个
  let fill = 1;
  while (opts.size < 4) {
    if (!opts.has(correct + fill)) opts.add(correct + fill);
    fill++;
  }
  const arr = [...opts];
  shuffleArray(arr);
  return arr.map(v => String(v));
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ====== 开始答题 ======
function startQuiz() {
  state.currentQ = 0;
  state.stars = 0;
  state.combo = 0;
  state.correct = 0;
  state.answering = false;
  generateQuestions();
  showPage('quiz');
  renderQuestion();
}

// ====== 渲染题目 ======
function renderQuestion() {
  const q = state.questions[state.currentQ];
  document.getElementById('progress-text').textContent = `第 ${state.currentQ+1}/${state.totalQ} 题`;
  document.getElementById('star-count').textContent = `⭐ ${state.stars}`;
  document.getElementById('progress-fill').style.width = `${((state.currentQ) / state.totalQ) * 100}%`;
  document.getElementById('question-tag').textContent = q.tag;
  document.getElementById('question-text').textContent = q.question;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(opt, btn);
    grid.appendChild(btn);
  });
}

// ====== 处理答题 ======
function handleAnswer(selected, btnEl) {
  if (state.answering) return;
  state.answering = true;

  const q = state.questions[state.currentQ];
  const isCorrect = selected === q.answer || String(selected) === String(q.answer);

  // 禁用所有按钮
  document.querySelectorAll('.option-btn').forEach(b => b.onclick = null);

  if (isCorrect) {
    btnEl.classList.add('correct');
    state.correct++;
    state.combo++;
    // 计算星星：基础1颗，连对额外奖励
    let earned = 1;
    if (state.combo >= 3) earned = 2;
    if (state.combo >= 5) earned = 3;
    state.stars += earned;
    showFeedback(true);
    showParticles(btnEl);
    if (state.combo >= 3) showCombo(state.combo);
  } else {
    btnEl.classList.add('wrong');
    state.combo = 0;
    showFeedback(false);
    // 高亮正确答案
    document.querySelectorAll('.option-btn').forEach(b => {
      const txt = b.textContent;
      if (txt === q.answer || txt === String(q.answer)) {
        b.classList.add('correct');
      }
    });
  }

  // 延迟进入下一题
  setTimeout(() => {
    state.currentQ++;
    if (state.currentQ >= state.totalQ) {
      showResult();
    } else {
      state.answering = false;
      renderQuestion();
    }
  }, 1200);
}

// ====== 反馈动画 ======
function showFeedback(correct) {
  const overlay = document.getElementById('feedback-overlay');
  overlay.innerHTML = `<div class="feedback-icon">${correct ? '✅' : '❌'}</div>`;
  overlay.classList.remove('show');
  void overlay.offsetWidth; // 触发 reflow
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 900);
}

// ====== 连击显示 ======
function showCombo(count) {
  const el = document.getElementById('combo-display');
  el.textContent = `🔥 ${count}连击！`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1100);
}

// ====== 粒子效果 ======
function showParticles(anchor) {
  const rect = anchor.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const colors = ['#ffd700','#ff6b9d','#4facfe','#a78bfa','#2ed573'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 / 12) * i;
    const dist = 40 + Math.random() * 40;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const size = 4 + Math.random() * 6;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:${size}px; height:${size}px;
      background:${colors[i%colors.length]};
      --tx:${tx}px; --ty:${ty}px;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}

// ====== 显示结果 ======

  const pct = Math.round((state.correct / state.totalQ) * 100);
  let starsDisplay, title, encourage;

  if (pct >= 90) {
    starsDisplay = '⭐⭐⭐';
    title = '太棒了，小指挥官！🏆';

    encourage = getRandomFrom([
      '再练练就能拿满分啦！💪',

    ]);

    encourage = getRandomFrom([
      '每次练习都在进步！再来一次吧！',
      '不怕失败，勇敢再来！你一定可以的！',
      '太空探险需要勇气！继续出发吧！',
    ]);
  } else {

      '学海无涯，慢慢来不着急！',

  document.getElementById('result-title').textContent = title;

  document.getElementById('result-detail').textContent = `答对 ${state.correct}/${state.totalQ} 题 | 获得 ⭐ ${state.stars} 颗星`;
  document.getElementById('result-encourage').textContent = encourage;
  showPage('result');
}

function getRandomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}
